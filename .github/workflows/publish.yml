name: Publish

# Triggers on module-scoped tags:
#   kotlin/vX.Y.Z          → publishes kotlin/core, kotlin/speech, kotlin/llm
#   ios-speech/vX.Y.Z      → publishes ios/speech  (placeholder)
#   flutter-speech/vX.Y.Z  → publishes flutter/speech  (placeholder)
#   rn-speech/vX.Y.Z       → publishes react-native/speech  (placeholder)
#
# Cancels any in-progress run for the same tag prefix so a corrected tag
# push doesn't queue behind a stale run.

on:
  push:
    tags:
      - 'kotlin/v*'
      - 'ios-speech/v*'
      - 'flutter-speech/v*'
      - 'rn-speech/v*'
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish (kotlin | ios-speech | flutter-speech | rn-speech)'
        required: true
        default: 'kotlin'
      version:
        description: 'Release version (e.g. 0.2.0-alpha01)'
        required: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-kotlin:
    name: Publish kotlin/* to Maven Central
    if: startsWith(github.ref, 'refs/tags/kotlin/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.module == 'kotlin')
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle + Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-macos-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # tag = kotlin/vX.Y.Z → strip "kotlin/v"
            echo "version=${GITHUB_REF_NAME#kotlin/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish kotlin/core, kotlin/speech, kotlin/llm
        run: |
          ./gradlew \
            :kotlin:core:publishAllPublicationsToMavenCentralRepository \
            :kotlin:speech:publishAllPublicationsToMavenCentralRepository \
            :kotlin:llm:publishAllPublicationsToMavenCentralRepository \
            --no-daemon
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

  # ── Placeholder jobs for future platform SDKs ────────────────────────────

  publish-ios-speech:
    name: Publish ios/speech
    if: startsWith(github.ref, 'refs/tags/ios-speech/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.module == 'ios-speech')
    runs-on: macos-latest
    steps:
      - run: echo "ios/speech publish not yet implemented"

  publish-flutter-speech:
    name: Publish flutter/speech
    if: startsWith(github.ref, 'refs/tags/flutter-speech/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.module == 'flutter-speech')
    runs-on: ubuntu-latest
    steps:
      - run: echo "flutter/speech publish not yet implemented"

  publish-rn-speech:
    name: Publish react-native/speech
    if: startsWith(github.ref, 'refs/tags/rn-speech/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.module == 'rn-speech')
    runs-on: ubuntu-latest
    steps:
      - run: echo "react-native/speech publish not yet implemented"
