name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Kotlin & C++ lint ──────────────────────────────────────────────────────
  lint:
    name: Lint (Ktlint · Detekt · clang-format · cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: yes | sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-lint-

      # ── Kotlin: Ktlint ──────────────────────────────────────────────────
      - name: Ktlint — check formatting
        run: |
          ./gradlew \
            :kotlin:core:ktlintCheck \
            :kotlin:speech:ktlintCheck \
            :kotlin:llm:ktlintCheck \
            :samples:composeApp:ktlintCheck \
            --no-daemon --continue

      # ── Kotlin: Detekt ──────────────────────────────────────────────────
      - name: Detekt — static analysis
        run: |
          ./gradlew \
            :kotlin:core:detekt \
            :kotlin:speech:detekt \
            :kotlin:llm:detekt \
            :samples:composeApp:detekt \
            --no-daemon --continue

      # ── C++: clang-format ───────────────────────────────────────────────
      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: clang-format — check C++ formatting
        run: |
          # Only check project-owned files, not submodule C++ (whisper.cpp, llama.cpp, etc.)
          CPP_FILES=$(find \
            kotlin/speech/src/commonMain/cpp \
            kotlin/speech/src/iosMain/cpp \
            kotlin/speech/src/iosMain/c_interop/include \
            kotlin/llm/src/commonMain/cpp \
            kotlin/llm/src/iosMain/cpp \
            kotlin/llm/src/iosMain/c_interop/include \
            -name "*.cpp" -o -name "*.h" -o -name "*.cc" 2>/dev/null | sort)

          if [ -z "$CPP_FILES" ]; then
            echo "No C++ files found — skipping"
            exit 0
          fi

          echo "Checking files:"
          echo "$CPP_FILES"

          FAILED=0
          for f in $CPP_FILES; do
            if ! clang-format --dry-run --Werror "$f" 2>/dev/null; then
              echo "::error file=$f::clang-format violation (run: clang-format -i $f)"
              FAILED=1
            fi
          done
          exit $FAILED

      # ── C++: cppcheck ───────────────────────────────────────────────────
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: cppcheck — static analysis
        run: |
          CPP_DIRS="
            kotlin/speech/src/commonMain/cpp
            kotlin/speech/src/iosMain/cpp
            kotlin/llm/src/commonMain/cpp
            kotlin/llm/src/iosMain/cpp
          "
          EXISTING_DIRS=""
          for d in $CPP_DIRS; do
            [ -d "$d" ] && EXISTING_DIRS="$EXISTING_DIRS $d"
          done

          if [ -z "$EXISTING_DIRS" ]; then
            echo "No C++ source directories found — skipping"
            exit 0
          fi

          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --inline-suppr \
            --std=c++17 \
            -q \
            $EXISTING_DIRS

  # ── Kotlin compile (Android + JVM) ────────────────────────────────────────
  build:
    name: Compile checks
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compile kotlin/speech (JVM)
        run: ./gradlew :kotlin:speech:compileKotlinJvm --no-daemon

      - name: Compile kotlin/speech (Android)
        run: ./gradlew :kotlin:speech:compileDebugKotlinAndroid --no-daemon

      - name: Compile kotlin/llm (JVM)
        run: ./gradlew :kotlin:llm:compileKotlinJvm --no-daemon

      - name: Compile kotlin/llm (Android)
        run: ./gradlew :kotlin:llm:compileDebugKotlinAndroid --no-daemon

      - name: Compile sample app (Android)
        run: ./gradlew :samples:composeApp:compileDebugKotlinAndroid --no-daemon

  # ── iOS compile ─────────────────────────────────────────────────────────────
  build-ios:
    name: iOS compile check
    runs-on: macos-latest
    needs: lint

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-macos-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-

      - name: Compile kotlin/speech (iOS Simulator arm64)
        run: ./gradlew :kotlin:speech:compileKotlinIosSimulatorArm64 --no-daemon

      - name: Compile kotlin/llm (iOS Simulator arm64)
        run: ./gradlew :kotlin:llm:compileKotlinIosSimulatorArm64 --no-daemon

      - name: Compile sample app (iOS Simulator arm64)
        run: ./gradlew :samples:composeApp:compileKotlinIosSimulatorArm64 --no-daemon
